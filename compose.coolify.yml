services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SERVICE_USER_DB}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_DB}
      POSTGRES_DB: ${POSTGRES_DB:-monsee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SERVICE_USER_DB} -d ${POSTGRES_DB:-monsee}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      target: runner
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://${SERVICE_USER_DB}:${SERVICE_PASSWORD_DB}@postgres:5432/${POSTGRES_DB:-monsee}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${SERVICE_BASE64_64_JWT}
      ENCRYPTION_KEY: ${SERVICE_BASE64_ENCRYPTIONKEY}
      APP_ENV: production
      PORT: "8080"
      PUBLIC_STATUS_ENABLED: ${PUBLIC_STATUS_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      target: worker
    environment:
      DATABASE_URL:  ${DATABASE_URL:-postgres://${SERVICE_USER_DB}:${SERVICE_PASSWORD_DB}@postgres:5432/${POSTGRES_DB:-monsee}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${SERVICE_BASE64_64_JWT}
      ENCRYPTION_KEY: ${SERVICE_BASE64_ENCRYPTIONKEY}
      APP_ENV: production
      FRONTEND_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  asynqmon:
    image: hibiken/asynqmon:latest
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  frontend:
    build:
      context: ./frontend
    environment:
      APP_URL: ${APP_URL}
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
      NEXT_PUBLIC_STATUS_PAGE: ${NEXT_PUBLIC_STATUS_PAGE:-true}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
